apiVersion: apps/v1
kind: Deployment
metadata: 
  name: mlflow
  namespace: mlops-app
spec:
  selector:
    matchLabels:
      app: mlflow
  replicas: 1
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: mlflow-custom:v3.10.1
          imagePullPolicy: Never
          command: ["mlflow", "server"]
          args:
            - --backend-store-uri=postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres.mlops-data.svc.cluster.local:5432/$(POSTGRES_DB)
            - --artifacts-destination=s3://mlflow/
            - --host=0.0.0.0
            - --port=5000
            - --allowed-hosts=*
          ports:
            - containerPort: 5000
          env:
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio.mlops-data.svc.cluster.local:9000"
            - name: AWS_S3_ENDPOINT_URL
              value: "http://minio.mlops-data.svc.cluster.local:9000"
            - name: MLFLOW_S3_IGNORE_TLS
              value: "true"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: MLFLOW_FLASK_SERVER_SECRET_KEY
              value: "mlops-secret"
            - name: GUNICORN_CMD_ARGS
              value: "--forwarded-allow-ips=*"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: AWS_SECRET_ACCESS_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlops-app
spec:
  selector:
    app: mlflow
  ports:
    - port: 5001
      targetPort: 5000
  type: ClusterIP
