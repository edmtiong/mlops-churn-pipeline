apiVersion: apps/v1
kind: Deployment
metadata: 
  name: fastapi
  namespace: mlops-app
spec:
  selector:
    matchLabels:
      app: fastapi
  replicas: 1
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: mlops-project-fastapi:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: AWS_SECRET_ACCESS_KEY
          envFrom:
            - configMapRef:
                name: mlflow-config
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi
  namespace: mlops-app
spec:
  selector:
    app: fastapi
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
