apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: mlops-data
spec:
  selector:
    matchLabels:
      app: minio
  serviceName: minio
  replicas: 1
  template:
      metadata:
        labels:
          app: minio
      spec:
        containers:
          - name: minio
            image: minio/minio:RELEASE.2025-01-20T14-49-07Z
            command: ["minio", "server", "/data", "--console-address", ":9001"]
            ports:
              - containerPort: 9000
              - containerPort: 9001
            env:
              - name: MINIO_ROOT_USER
                valueFrom:
                  secretKeyRef:
                    name: minio-secret
                    key: AWS_ACCESS_KEY_ID
              - name: MINIO_ROOT_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: minio-secret
                    key: AWS_SECRET_ACCESS_KEY
            volumeMounts:
              - name: minio-data
                mountPath: /data
  volumeClaimTemplates:
      - metadata:
          name: minio-data
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: mlops-data
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  type: ClusterIP
